<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoDescarte</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

/* BODY */
body{
  background: linear-gradient(135deg,#0b1220,#12303b,#1e4c4a);
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:rgba(255,255,255,0.08);
}

/* MENU */
.menu-btn{
  background:none;
  border:none;
  color:white;
  font-size:20px;
  cursor:pointer;
}

.sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:250px;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.3s;
}

.sidebar.active{left:0;}

.sidebar button{
  width:100%;
  margin-bottom:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#222;
  color:white;
  cursor:pointer;
}

/* PAGES */
.page{display:none;}
.page.active{display:block;}

main{padding:20px;}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

/* VIDEO (REFEITO COMPLETO) */
.video-container{
  width:100%;
  max-width:100%;
  border-radius:16px;
  overflow:hidden;
  background:black;
}

.video-container iframe{
  width:100%;
  height:220px; /* altura fixa evita bug em mobile */
  border:none;
  display:block;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.mini-card{
  background:#222;
  padding:15px;
  border-radius:15px;
}

/* FORM */
input,select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
}

.primary-btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#6effb2;
  cursor:pointer;
}

/* RESPONSIVO */
@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
  .video-container iframe{height:200px;}
}

</style>
</head>

<body>

<header>
  <div><i class="fa-solid fa-recycle"></i> EcoDescarte</div>
  <button class="menu-btn" onclick="toggleMenu()">
    <i class="fa-solid fa-bars"></i>
  </button>
</header>

<aside class="sidebar" id="sidebar">
  <button onclick="showPage('home')"><i class="fa-solid fa-house"></i> Início</button>
  <button onclick="showPage('locations')"><i class="fa-solid fa-location-dot"></i> Coleta</button>
  <button onclick="showPage('shop')"><i class="fa-solid fa-store"></i> Loja</button>
  <button onclick="showPage('info')"><i class="fa-solid fa-circle-info"></i> Info</button>
  <button onclick="showPage('profile')"><i class="fa-solid fa-user"></i> Perfil</button>
</aside>

<main>

<!-- HOME -->
<section id="home" class="page active">
  <div class="card">
    <h2><i class="fa-solid fa-leaf"></i> Página inicial</h2>

    <p>Aprenda sobre descarte correto:</p>

    <div class="video-container">
      <iframe 
        src="https://www.youtube.com/embed/Gqk161ll21s?playsinline=1"
        allowfullscreen>
      </iframe>
    </div>

  </div>
</section>

<!-- COLETA -->
<section id="locations" class="page">
  <div class="card">
    <h2><i class="fa-solid fa-location-dot"></i> Pontos de coleta</h2>

    <input id="search" placeholder="Buscar...">
    <select id="category">
      <option value="">Todos</option>
      <option value="celular">Celular</option>
      <option value="notebook">Notebook</option>
    </select>

    <button class="primary-btn" onclick="searchLocations()">Buscar</button>

    <div class="grid" id="results"></div>
  </div>
</section>

<!-- LOJA -->
<section id="shop" class="page">
  <div class="card">
    <h2><i class="fa-solid fa-store"></i> Loja</h2>

    <div class="grid">
      <div class="mini-card">
        <h3><i class="fa-solid fa-ticket"></i> Cupom</h3>
        <p>Troque pontos</p>
      </div>

      <div class="mini-card">
        <h3><i class="fa-solid fa-gift"></i> Brinde</h3>
        <p>Itens ecológicos</p>
      </div>
    </div>

  </div>
</section>

<!-- INFO -->
<section id="info" class="page">
  <div class="card">
    <h2><i class="fa-solid fa-circle-info"></i> Informações</h2>
    <p>O descarte correto ajuda o meio ambiente 🌱</p>
  </div>
</section>

<!-- PERFIL -->
<section id="profile" class="page">
  <div class="card">

    <h2><i class="fa-solid fa-user"></i> Perfil</h2>

    <input id="name" placeholder="Nome">
    <input id="email" placeholder="Email">

    <button class="primary-btn" onclick="saveProfile()">Salvar</button>

    <p id="status"></p>

  </div>
</section>

</main>

<script>

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

const locations = [
  {name:"EcoPonto Central", type:"celular"},
  {name:"Tech Verde", type:"notebook"}
];

function searchLocations(){
  const search = document.getElementById("search").value.toLowerCase();
  const category = document.getElementById("category").value;

  const results = locations.filter(loc =>
    loc.name.toLowerCase().includes(search) &&
    (category === "" || loc.type === category)
  );

  const container = document.getElementById("results");
  container.innerHTML = "";

  results.forEach(loc=>{
    container.innerHTML += `
      <div class="mini-card">
        <h3>${loc.name}</h3>
        <p>${loc.type}</p>
      </div>
    `;
  });
}

function saveProfile(){
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const status = document.getElementById("status");

  if(!name || !email){
    status.innerText = "Preencha tudo!";
    status.style.color="red";
    return;
  }

  localStorage.setItem("user", JSON.stringify({name,email}));

  status.innerText = "Salvo!";
  status.style.color="#6effb2";
}

window.onload = ()=>{
  const user = JSON.parse(localStorage.getItem("user"));
  if(user){
    document.getElementById("name").value = user.name;
    document.getElementById("email").value = user.email;
  }
  searchLocations();
}

</script>

</body>
</html>
